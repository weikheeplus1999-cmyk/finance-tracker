<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Finance Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.3/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#f5f0e8;font-family:'Trebuchet MS','Segoe UI',Arial,sans-serif;min-height:100vh;}
select,input,button{font-family:inherit;}
button:active{opacity:0.85;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const{useState,useEffect,useMemo}=React;

const CATS={
  Income:       {subs:["Salary","Investments","Part Time","Other"],color:"#00b8a0",bg:"#e0faf6",emoji:"💰"},
  Transport:    {subs:["Car Loan","Fuel","Parking/Tolls","Maintenance","Other"],color:"#4361ee",bg:"#eaedff",emoji:"🚗"},
  "F&B":        {subs:["Groceries","Dine Out","Snacks","Other"],color:"#ff6b35",bg:"#fff0eb",emoji:"🍽️"},
  Personal:     {subs:["Personal Care","Wears","Fitness","Subscriptions","Entertainment","Hobbies","Other"],color:"#8338ec",bg:"#f3eaff",emoji:"✨"},
  Health:       {subs:["Medical","Supplements","Health Insurance","Other"],color:"#ff006e",bg:"#ffe0ef",emoji:"❤️"},
  Housing:      {subs:["Rental","Electricity Bill","Water Bill","Gas Bill","Internet Bill","Laundry","Home Supplies","Other"],color:"#06d6a0",bg:"#e0fff7",emoji:"🏠"},
  Social:       {subs:["Gifts","Events","Other"],color:"#118ab2",bg:"#e0f4ff",emoji:"👥"},
  Miscellaneous:{subs:["Other"],color:"#e9a400",bg:"#fff8e0",emoji:"📦"},
};
const EXP=["Transport","F&B","Personal","Health","Housing","Social","Miscellaneous"];
const MO=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const FMO=["January","February","March","April","May","June","July","August","September","October","November","December"];
const PC=["#4361ee","#ff6b35","#8338ec","#ff006e","#06d6a0","#118ab2","#e9a400","#00b8a0"];
const fmt=n=>"RM "+Math.abs(n).toLocaleString("en-MY",{minimumFractionDigits:2,maximumFractionDigits:2});
const SK="ft_v6",SK_S="ft_sav_v6",SK_F="ft_fc_v6";
const ld=k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}};
const sv=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};
const mkKey=(m,y)=>y+"-"+String(m+1).padStart(2,"0");
const sameMo=(s,i,y)=>{const p=s.split("-");return parseInt(p[1],10)-1===i&&parseInt(p[0],10)===y;};

function Pie({data,size}){
  size=size||150;
  if(!data||!data.length)return null;
  const tot=data.reduce((s,d)=>s+d.v,0);
  if(!tot)return null;
  let cum=0;
  const sl=data.map((d,i)=>{
    const p=d.v/tot,a1=cum*2*Math.PI-Math.PI/2,a2=(cum+p)*2*Math.PI-Math.PI/2;
    cum+=p;
    const r=size/2-6,cx=size/2,cy=size/2;
    return{path:"M"+cx+","+cy+" L"+(cx+r*Math.cos(a1))+","+(cy+r*Math.sin(a1))+" A"+r+","+r+",0,"+(p>0.5?1:0)+",1,"+(cx+r*Math.cos(a2))+","+(cy+r*Math.sin(a2))+" Z",c:PC[i%PC.length]};
  });
  return(
    <svg width={size} height={size} viewBox={"0 0 "+size+" "+size}>
      {sl.map((s,i)=><path key={i} d={s.path} fill={s.c} stroke="#fff" strokeWidth={2}/>)}
      <circle cx={size/2} cy={size/2} r={size/3.2} fill="#fff"/>
    </svg>
  );
}

function Line({pts,color}){
  color=color||"#00b8a0";
  if(!pts||pts.length<2)return null;
  const w=300,h=70,p=10,mx=Math.max.apply(null,pts.concat([1]));
  const xs=pts.map(function(_,i){return p+(i/(pts.length-1))*(w-p*2);});
  const ys=pts.map(function(v){return h-p-(v/mx)*(h-p*2);});
  return(
    <svg width="100%" viewBox={"0 0 "+w+" "+h} preserveAspectRatio="none" style={{display:"block"}}>
      <polyline points={xs.map(function(x,i){return x+","+ys[i];}).join(" ")} fill="none" stroke={color} strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round"/>
      {xs.map(function(x,i){return <circle key={i} cx={x} cy={ys[i]} r={4} fill={color} stroke="#fff" strokeWidth={1.5}/>;} )}
    </svg>
  );
}

const NAV=[{id:"summary",l:"Summary",e:"📊"},{id:"income",l:"Income",e:"💰"},{id:"expenses",l:"Expenses",e:"💸"},{id:"savings",l:"Savings",e:"🏦"},{id:"freecash",l:"Free Cash",e:"💵"},{id:"comparison",l:"Comparison",e:"📈"}];

const D={
  wrap:{background:"#f5f0e8",minHeight:"100vh",padding:"16px",maxWidth:600,margin:"0 auto",color:"#1a1a1a"},
  hdr:{background:"#1a1a1a",borderRadius:16,padding:"16px 20px",marginBottom:16,textAlign:"center"},
  hdrT:{fontSize:26,fontWeight:900,color:"#ffffff",letterSpacing:2,textTransform:"uppercase",fontStyle:"italic"},
  hdrS:{fontSize:11,color:"#999",marginTop:3},
  nav:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:16},
  navB:function(a){return{padding:"10px 6px",borderRadius:12,border:"2px solid #1a1a1a",background:a?"#ffd60a":"#fff",color:"#1a1a1a",cursor:"pointer",fontSize:12,fontWeight:a?700:500,display:"flex",flexDirection:"column",alignItems:"center",gap:3,textAlign:"center",boxShadow:a?"3px 3px 0 #1a1a1a":"2px 2px 0 #1a1a1a"};},
  mrow:{display:"flex",gap:8,marginBottom:16,alignItems:"center",flexWrap:"wrap",justifyContent:"center"},
  sel:{padding:"8px 12px",borderRadius:10,border:"2px solid #1a1a1a",background:"#fff",color:"#1a1a1a",fontSize:13,fontWeight:500,boxShadow:"2px 2px 0 #1a1a1a"},
  card:{background:"#fff",border:"2px solid #1a1a1a",borderRadius:16,padding:"16px 18px",marginBottom:12,boxShadow:"4px 4px 0 #1a1a1a"},
  grid:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:10,marginBottom:16},
  mc:function(bg){return{padding:"14px 16px",borderRadius:14,background:bg,border:"2px solid #1a1a1a",textAlign:"center",boxShadow:"3px 3px 0 #1a1a1a"};},
  mlbl:{fontSize:10,color:"#1a1a1a",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:5,fontWeight:700,opacity:0.6},
  mv:function(c){return{fontSize:16,fontWeight:700,color:c||"#1a1a1a"};},
  secL:{fontSize:11,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:"0.1em",textAlign:"center",marginBottom:4},
  secT:{fontSize:18,fontWeight:700,color:"#1a1a1a",textAlign:"center",marginBottom:16},
  bRow:{display:"flex",alignItems:"center",gap:10,marginBottom:10},
  bIco:function(c,bg){return{width:30,height:30,borderRadius:8,background:bg,border:"2px solid "+c,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0};},
  bLbl:{fontSize:12,width:85,color:"#555",flexShrink:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"},
  bTrk:{flex:1,height:10,borderRadius:5,background:"#f0ece4",overflow:"hidden",border:"1.5px solid #ddd"},
  bFil:function(c,p){return{height:"100%",width:Math.min(100,Math.max(0,p))+"%",background:c,borderRadius:4};},
  bAmt:{fontSize:12,color:"#555",width:85,textAlign:"right",flexShrink:0,fontWeight:600},
  txR:{display:"flex",alignItems:"center",gap:10,padding:"12px 6px",borderBottom:"1.5px dashed #e0dbd0"},
  bdg:function(c,bg){return{fontSize:11,padding:"3px 9px",borderRadius:20,background:bg,color:c,fontWeight:700,flexShrink:0,border:"1.5px solid "+c};},
  chp:function(c,bg){return{width:36,height:36,borderRadius:10,background:bg,border:"2px solid "+c,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0};},
  oBtn:{padding:"7px 13px",borderRadius:9,border:"2px solid #1a1a1a",background:"#fff",color:"#1a1a1a",cursor:"pointer",fontSize:12,fontWeight:600,display:"inline-flex",alignItems:"center",gap:4,boxShadow:"2px 2px 0 #1a1a1a"},
  dBtn:{padding:"7px 13px",borderRadius:9,border:"2px solid #ff006e",background:"#fff0f5",color:"#ff006e",cursor:"pointer",fontSize:12,fontWeight:600,display:"inline-flex",alignItems:"center",gap:4,boxShadow:"2px 2px 0 #ff006e"},
  gBtn:{padding:"9px 16px",borderRadius:10,border:"2px solid #1a1a1a",background:"#00b8a0",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:700,display:"inline-flex",alignItems:"center",gap:6,boxShadow:"3px 3px 0 #1a1a1a"},
  aBtn:{padding:"9px 18px",borderRadius:10,border:"2px solid #1a1a1a",background:"#4361ee",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:700,display:"inline-flex",alignItems:"center",gap:6,boxShadow:"3px 3px 0 #1a1a1a"},
  pBtn:{padding:"7px 13px",borderRadius:9,border:"2px solid #1a1a1a",background:"#8338ec",color:"#fff",cursor:"pointer",fontSize:12,fontWeight:600,display:"inline-flex",alignItems:"center",gap:4,boxShadow:"2px 2px 0 #1a1a1a"},
  seg:function(a,c){return{flex:1,padding:"10px",textAlign:"center",cursor:"pointer",fontSize:13,fontWeight:a?700:500,background:a?c:"#fff",color:a?"#fff":"#555",border:"none"};},
  fLbl:{fontSize:12,color:"#555",display:"block",marginBottom:5,fontWeight:700,textAlign:"center"},
  fInp:{width:"100%",padding:"10px 12px",borderRadius:10,border:"2px solid #1a1a1a",background:"#fff",color:"#1a1a1a",fontSize:14,boxSizing:"border-box",textAlign:"center",boxShadow:"2px 2px 0 #1a1a1a"},
  fGrp:{marginBottom:14},
  sBtn:{width:"100%",padding:"12px",marginTop:6,background:"#1a1a1a",color:"#ffd60a",border:"2px solid #1a1a1a",borderRadius:12,fontWeight:700,fontSize:15,cursor:"pointer"},
  subG:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(155px,1fr))",gap:10},
  subC:function(c,bg){return{background:bg,border:"2px solid "+c,borderRadius:12,padding:"12px 14px",boxShadow:"3px 3px 0 "+c};},
  arB:{padding:"7px 10px",borderRadius:9,border:"2px solid #1a1a1a",background:"#fff",color:"#1a1a1a",cursor:"pointer",fontSize:16,fontWeight:700,display:"inline-flex",alignItems:"center",boxShadow:"2px 2px 0 #1a1a1a"},
};

function App(){
  const now=new Date();
  const[txns,setTxns]=useState([]);
  const[sav,setSav]=useState({});
  const[fc,setFc]=useState([]);
  const[ready,setRdy]=useState(false);
  const[tab,setTab]=useState("summary");
  const[view,setView]=useState("main");
  const[mo,setMo]=useState(now.getMonth());
  const[yr,setYr]=useState(now.getFullYear());
  const[eid,setEid]=useState(null);
  const[selMode,setSelMode]=useState(false);
  const[sel,setSel]=useState([]);
  const[savTgt,setSavTgt]=useState("");
  const[editSK,setEditSK]=useState(null);
  const[cmpA,setCmpA]=useState(now.getMonth()===0?11:now.getMonth()-1);
  const[cmpB,setCmpB]=useState(now.getMonth());
  const[cmpYr,setCmpYr]=useState(now.getFullYear());
  const[expMo,setExpMo]=useState(now.getMonth());
  const[expYr,setExpYr]=useState(now.getFullYear());
  const[fcF,setFcF]=useState({amount:"",note:"",date:now.toISOString().slice(0,10)});
  const[form,setForm]=useState({category:"Transport",subcategory:"Fuel",amount:"",note:"",date:now.toISOString().slice(0,10)});

  useEffect(function(){setTxns(ld(SK)||[]);setSav(ld(SK_S)||{});setFc(ld(SK_F)||[]);setRdy(true);},[]);

  const yrs=Array.from({length:5},function(_,i){return now.getFullYear()-2+i;});
  const dd=function(m,y){return m===now.getMonth()&&y===now.getFullYear()?now.toISOString().slice(0,10):y+"-"+String(m+1).padStart(2,"0")+"-01";};

  function prevMo(){var m=mo===0?11:mo-1,y=mo===0?yr-1:yr;setMo(m);setYr(y);}
  function nextMo(){var m=mo===11?0:mo+1,y=mo===11?yr+1:yr;setMo(m);setYr(y);}

  const filt=useMemo(function(){return txns.filter(function(t){return sameMo(t.date,mo,yr);});},[txns,mo,yr]);
  const inc=useMemo(function(){return filt.filter(function(t){return t.category==="Income";}).reduce(function(s,t){return s+t.amount;},0);},[filt]);
  const exp=useMemo(function(){return filt.filter(function(t){return t.category!=="Income";}).reduce(function(s,t){return s+t.amount;},0);},[filt]);
  const stAmt=useMemo(function(){return parseFloat(sav[mkKey(mo,yr)]||0);},[sav,mo,yr]);
  const net=inc-exp-stAmt;
  const fcMo=Math.max(0,net);
  const sRate=inc>0?Math.max(0,(stAmt+fcMo)/inc*100):0;

  const catT=useMemo(function(){var m={};filt.filter(function(t){return t.category!=="Income";}).forEach(function(t){m[t.category]=(m[t.category]||0)+t.amount;});return Object.entries(m).sort(function(a,b){return b[1]-a[1];});},[filt]);
  const subM=useMemo(function(){var m={};filt.filter(function(t){return t.category!=="Income";}).forEach(function(t){var k=t.category+"__"+t.subcategory;m[k]=(m[k]||0)+t.amount;});return m;},[filt]);
  const incBd=useMemo(function(){var m={};filt.filter(function(t){return t.category==="Income";}).forEach(function(t){m[t.subcategory]=(m[t.subcategory]||0)+t.amount;});return Object.entries(m).sort(function(a,b){return b[1]-a[1];});},[filt]);
  const trend=useMemo(function(){return MO.map(function(_,i){return txns.filter(function(t){return sameMo(t.date,i,yr)&&t.category!=="Income";}).reduce(function(s,t){return s+t.amount;},0);});},[txns,yr]);
  const savTrend=useMemo(function(){return MO.map(function(_,i){var key=mkKey(i,yr),tgt=parseFloat(sav[key]||0),mo2=txns.filter(function(t){return sameMo(t.date,i,yr);}),i2=mo2.filter(function(t){return t.category==="Income";}).reduce(function(s,t){return s+t.amount;},0),e2=mo2.filter(function(t){return t.category!=="Income";}).reduce(function(s,t){return s+t.amount;},0);return{month:MO[i],target:tgt,net:i2-e2-tgt};});},[txns,sav,yr]);
  const fcMos=useMemo(function(){
    var res=[];
    for(var i=0;i<12;i++){
      var key=mkKey(i,yr),tgt=parseFloat(sav[key]||0);
      var mo2=txns.filter(function(t){return sameMo(t.date,i,yr);});
      var i2=mo2.filter(function(t){return t.category==="Income";}).reduce(function(s,t){return s+t.amount;},0);
      var e2=mo2.filter(function(t){return t.category!=="Income";}).reduce(function(s,t){return s+t.amount;},0);
      var fca=Math.max(0,i2-e2-tgt);
      var ii=i;
      var used=fc.filter(function(f){return f&&f.date&&sameMo(f.date,ii,yr);}).reduce(function(s,f){return s+parseFloat(f.amount||0);},0);
      if(i2>0||e2>0||used>0)res.push({month:MO[i],idx:i,freeCash:fca,used:used,remaining:fca-used});
    }
    return res;
  },[txns,sav,fc,yr]);
  const tfca=fcMos.reduce(function(s,m){return s+m.freeCash;},0);
  const tfcu=fcMos.reduce(function(s,m){return s+m.used;},0);
  const tfcr=fcMos.reduce(function(s,m){return s+m.remaining;},0);
  const cmp=useMemo(function(){
    var gm=function(m){return txns.filter(function(t){return sameMo(t.date,m,cmpYr);});};
    var tA=gm(cmpA),tB=gm(cmpB);
    var sm=function(arr,isI){return arr.filter(function(t){return isI?t.category==="Income":t.category!=="Income";}).reduce(function(s,t){return s+t.amount;},0);};
    return{iA:sm(tA,true),iB:sm(tB,true),eA:sm(tA,false),eB:sm(tB,false),cats:EXP.map(function(c){return{cat:c,a:tA.filter(function(t){return t.category===c;}).reduce(function(s,t){return s+t.amount;},0),b:tB.filter(function(t){return t.category===c;}).reduce(function(s,t){return s+t.amount;},0)};}).filter(function(x){return x.a>0||x.b>0;})};
  },[txns,cmpA,cmpB,cmpYr]);
  const bMax=catT.length?catT[0][1]:1;

  function uf(k,v){setForm(function(f){var n=Object.assign({},f);n[k]=v;if(k==="category")n.subcategory=CATS[v].subs[0];return n;});}
  function submit(){
    if(!form.amount||isNaN(+form.amount)||+form.amount<=0)return;
    var cat=tab==="income"?"Income":form.category;
    var e={id:eid||String(Date.now()),category:cat,subcategory:form.subcategory,amount:parseFloat(form.amount),note:form.note,date:form.date};
    var u=eid?txns.map(function(t){return t.id===eid?e:t;}):[e].concat(txns);
    setTxns(u);sv(SK,u);setEid(null);
    setForm({category:"Transport",subcategory:"Fuel",amount:"",note:"",date:dd(mo,yr)});
    setView("main");
  }
  function startEdit(t){setEid(t.id);setForm({category:t.category,subcategory:t.subcategory,amount:String(t.amount),note:t.note||"",date:t.date});setView("add");}
  function delT(id){var u=txns.filter(function(t){return t.id!==id;});setTxns(u);sv(SK,u);}
  function delSel(){var u=txns.filter(function(t){return sel.indexOf(t.id)===-1;});setTxns(u);sv(SK,u);setSel([]);setSelMode(false);}
  function togSel(id){setSel(function(s){return s.indexOf(id)!==-1?s.filter(function(x){return x!==id;}):[].concat(s,[id]);});}
  function togAll(list){var a=list.every(function(t){return sel.indexOf(t.id)!==-1;});if(a){setSel(function(s){return s.filter(function(x){return list.findIndex(function(t){return t.id===x;})===-1;});});}else{var ta=list.filter(function(t){return sel.indexOf(t.id)===-1;}).map(function(t){return t.id;});setSel(function(s){return s.concat(ta);});}}
  function saveST(i,y){var key=mkKey(i,y),v=parseFloat(savTgt)||0,u=Object.assign({},sav);u[key]=v;setSav(u);sv(SK_S,u);setEditSK(null);setSavTgt("");}
  function addFc(){if(!fcF.amount||isNaN(+fcF.amount)||+fcF.amount<=0)return;var e={id:String(Date.now()),amount:parseFloat(fcF.amount),note:fcF.note,date:fcF.date};var u=[e].concat(fc);setFc(u);sv(SK_F,u);setFcF({amount:"",note:"",date:now.toISOString().slice(0,10)});}
  function delFc(id){var u=fc.filter(function(f){return f.id!==id;});setFc(u);sv(SK_F,u);}
  function expBk(){
    try{var bk={version:1,txns:txns,savings:sav,fcTxns:fc,exportedAt:new Date().toISOString()};var blob=new Blob([JSON.stringify(bk,null,2)],{type:"application/json"});var url=URL.createObjectURL(blob);var a=document.createElement("a");a.href=url;a.download="finance_backup_"+new Date().toISOString().slice(0,10)+".json";document.body.appendChild(a);a.click();setTimeout(function(){URL.revokeObjectURL(url);document.body.removeChild(a);},100);}
    catch(e){var bk2={version:1,txns:txns,savings:sav,fcTxns:fc};var a2=document.createElement("a");a2.setAttribute("href","data:application/json;charset=utf-8,"+encodeURIComponent(JSON.stringify(bk2)));a2.setAttribute("download","finance_backup.json");document.body.appendChild(a2);a2.click();document.body.removeChild(a2);}
  }
  function impBk(e){var file=e.target.files[0];if(!file)return;var r=new FileReader();r.onload=function(ev){try{var d=JSON.parse(ev.target.result);if(!d.version||!d.txns){alert("Invalid backup.");return;}setTxns(d.txns||[]);sv(SK,d.txns||[]);setSav(d.savings||{});sv(SK_S,d.savings||{});setFc(d.fcTxns||[]);sv(SK_F,d.fcTxns||[]);alert("Restored! "+(d.txns||[]).length+" transactions loaded.");}catch(err){alert("Failed to read file.");}};r.readAsText(file);e.target.value="";}
  function expCSV(){var rows=txns.filter(function(t){return sameMo(t.date,expMo,expYr);});var lines=["Date,Category,Subcategory,Amount,Note"].concat(rows.map(function(r){return[r.date,r.category,r.subcategory,r.amount,'"'+(r.note||"")+'"'].join(",");}));var a=document.createElement("a");a.setAttribute("href","data:text/csv;charset=utf-8,"+encodeURIComponent(lines.join("\n")));a.setAttribute("download","finance_"+MO[expMo]+"_"+expYr+".csv");document.body.appendChild(a);a.click();document.body.removeChild(a);}

  if(!ready)return <div style={{background:"#f5f0e8",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{fontSize:14,color:"#888",fontWeight:700,letterSpacing:1}}>LOADING...</div></div>;

  if(view==="add"){
    var isI=tab==="income";
    var cats=isI?["Income"]:EXP;
    var subs=isI?CATS.Income.subs:(CATS[form.category]?CATS[form.category].subs:[]);
    return(
      <div style={D.wrap}>
        <div style={D.hdr}><div style={D.hdrT}>Finance Tracker</div></div>
        <div style={{textAlign:"center",marginBottom:12}}><button style={D.oBtn} onClick={function(){setView("main");setEid(null);}}>← Back</button></div>
        <div style={D.card}>
          <div style={{textAlign:"center",marginBottom:16}}>
            <span style={{fontSize:40}}>{isI?"💰":"💸"}</span>
            <div style={{fontSize:16,fontWeight:700,color:isI?"#00b8a0":"#ff6b35",marginTop:6}}>{isI?"Adding Income":"Adding Expense"}</div>
          </div>
          <div style={{display:"flex",borderRadius:12,overflow:"hidden",border:"2px solid #1a1a1a",marginBottom:16}}>

      {tab==="expenses"&&<div>

          <MC label={MO[cmpB]+" income"} value={fmt(cmp.iB)} color="#ff6b35" bg="#fff0eb"/>
          <MC label={MO[cmpA]+" exp"} value={fmt(cmp.eA)} color="#4361ee" bg="#eaedff"/>
          <MC label={MO[cmpB]+" exp"} value={fmt(cmp.eB)} color="#ff6b35" bg="#fff0eb"/>
        </div>
        <div style={D.card}>
          <div style={D.secL}>Category</div><div style={D.secT}>Category comparison</div>
          {cmp.cats.length===0&&<p style={{color:"#aaa",fontSize:13,textAlign:"center",padding:"16px 0"}}>No data for these months.</p>}
          {cmp.cats.map(function(x){var m=CATS[x.cat],mx=Math.max(x.a,x.b,1);return <div key={x.cat} style={{marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6,justifyContent:"center"}}><span>{m.emoji}</span><span style={{fontSize:13,fontWeight:700}}>{x.cat}</span></div>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:11,color:"#4361ee",width:32,textAlign:"right",flexShrink:0,fontWeight:700}}>{MO[cmpA]}</span><div style={D.bTrk}><div style={D.bFil("#4361ee",(x.a/mx)*100)}></div></div><span style={{fontSize:12,color:"#555",width:80,textAlign:"right",flexShrink:0,fontWeight:600}}>{fmt(x.a)}</span></div>
              <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:11,color:"#ff6b35",width:32,textAlign:"right",flexShrink:0,fontWeight:700}}>{MO[cmpB]}</span><div style={D.bTrk}><div style={D.bFil("#ff6b35",(x.b/mx)*100)}></div></div><span style={{fontSize:12,color:"#555",width:80,textAlign:"right",flexShrink:0,fontWeight:600}}>{fmt(x.b)}</span></div>
              {x.a>0&&x.b>0&&<div style={{fontSize:11,color:x.b>x.a?"#ff006e":"#00b8a0",textAlign:"center",marginTop:2,fontWeight:700}}>{x.b>x.a?"📈":"📉"} {Math.abs(((x.b-x.a)/x.a)*100).toFixed(1)}% {x.b>x.a?"more":"less"} than {MO[cmpA]}</div>}
            </div>
          </div>;})}
        </div>
        <div style={D.card}>
          <div style={D.secL}>Summary</div><div style={D.secT}>Summary comparison</div>
          {[{l:"Income",a:cmp.iA,b:cmp.iB},{l:"Expenses",a:cmp.eA,b:cmp.eB},{l:"Net",a:cmp.iA-cmp.eA,b:cmp.iB-cmp.eB}].map(function(row){
            var mx=Math.max(Math.abs(row.a),Math.abs(row.b),1);
            return <div key={row.l} style={{marginBottom:14}}>
              <div style={{fontSize:12,fontWeight:700,color:"#888",marginBottom:6,textAlign:"center",textTransform:"uppercase",letterSpacing:"0.05em"}}>{row.l}</div>
              <div style={{display:"flex",flexDirection:"column",gap:4}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:11,color:"#4361ee",width:32,textAlign:"right",flexShrink:0,fontWeight:700}}>{MO[cmpA]}</span><div style={D.bTrk}><div style={D.bFil("#4361ee",(Math.abs(row.a)/mx)*100)}></div></div><span style={{fontSize:12,color:"#555",width:80,textAlign:"right",flexShrink:0,fontWeight:600}}>{row.a<0?"-":""}{fmt(row.a)}</span></div>
                <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:11,color:"#ff6b35",width:32,textAlign:"right",flexShrink:0,fontWeight:700}}>{MO[cmpB]}</span><div style={D.bTrk}><div style={D.bFil("#ff6b35",(Math.abs(row.b)/mx)*100)}></div></div><span style={{fontSize:12,color:"#555",width:80,textAlign:"right",flexShrink:0,fontWeight:600}}>{row.b<0?"-":""}{fmt(row.b)}</span></div>
              </div>
            </div>;
          })}
        </div>
      </div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
