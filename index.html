function Pie({data,size}){
  size=size||150;
  if(!data||!data.length)return null;
  const tot=data.reduce(function(s,d){return s+d.v;},0);
  if(!tot)return null;
  let cum=0;
  const sl=data.map(function(d,i){
    const p=d.v/tot,a1=cum*2*Math.PI-Math.PI/2,a2=(cum+p)*2*Math.PI-Math.PI/2;
    cum+=p;
    const r=size/2-6,cx=size/2,cy=size/2;
    return{path:"M"+cx+","+cy+" L"+(cx+r*Math.cos(a1))+","+(cy+r*Math.sin(a1))+" A"+r+","+r+",0,"+(p>0.5?1:0)+",1,"+(cx+r*Math.cos(a2))+","+(cy+r*Math.sin(a2))+" Z",c:PC[i%PC.length]};
  });
  return(
    <svg width={size} height={size} viewBox={"0 0 "+size+" "+size}>
      {sl.map(function(s,i){return <path key={i} d={s.path} fill={s.c} stroke="#111827" strokeWidth={2}/>;} )}
      <circle cx={size/2} cy={size/2} r={size/3.2} fill="#111827"/>
    </svg>
  );
}

function Line({pts,color}){
  color=color||"#4ade80";
  if(!pts||pts.length<2)return null;
  const w=300,h=70,p=10,mx=Math.max.apply(null,pts.concat([1]));
  const xs=pts.map(function(_,i){return p+(i/(pts.length-1))*(w-p*2);});
  const ys=pts.map(function(v){return h-p-(v/mx)*(h-p*2);});
  return(
    <svg width="100%" viewBox={"0 0 "+w+" "+h} preserveAspectRatio="none" style={{display:"block"}}>
      <polyline points={xs.map(function(x,i){return x+","+ys[i];}).join(" ")} fill="none" stroke={color} strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round"/>
      {xs.map(function(x,i){return <circle key={i} cx={x} cy={ys[i]} r={4} fill={color} stroke="#111827" strokeWidth={1.5}/>;} )}
    </svg>
  );
}

const NAV=[{id:"summary",l:"Summary",e:"📊"},{id:"income",l:"Income",e:"💰"},{id:"expenses",l:"Expenses",e:"💸"},{id:"savings",l:"Savings",e:"🏦"},{id:"freecash",l:"Free Cash",e:"🍋"},{id:"comparison",l:"Comparison",e:"📈"}];

const D={
  wrap:   {background:"#0a0a0a",minHeight:"100vh",padding:"16px",maxWidth:600,margin:"0 auto",color:"#e5e7eb"},

  mrow:   {display:"flex",gap:8,marginBottom:14,alignItems:"center",flexWrap:"wrap",justifyContent:"center"},

  chp:    function(c){return{width:34,height:34,borderRadius:9,background:c+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0};},
  oBtn:   {padding:"6px 12px",borderRadius:8,border:"1px solid #2a2a2a",background:"#1a1a1a",color:"#9ca3af",cursor:"pointer",fontSize:12,display:"inline-flex",alignItems:"center",gap:4},

function App(){
  const now=new Date();
  const[txns,setTxns]=useState([]);
  const[sav,setSav]=useState({});
  const[fc,setFc]=useState([]);
  const[tab,setTab]=useState("summary");
  const[view,setView]=useState("main");
  const[mo,setMo]=useState(now.getMonth());
  const[yr,setYr]=useState(now.getFullYear());
  const[eid,setEid]=useState(null);
  const[selMode,setSelMode]=useState(false);
  const[sel,setSel]=useState([]);
  const[savTgt,setSavTgt]=useState("");
  const[editSK,setEditSK]=useState(null);
  const[cmpA,setCmpA]=useState(now.getMonth()===0?11:now.getMonth()-1);
  const[cmpB,setCmpB]=useState(now.getMonth());
  const[cmpYr,setCmpYr]=useState(now.getFullYear());
  const[expMo,setExpMo]=useState(now.getMonth());
  const[expYr,setExpYr]=useState(now.getFullYear());
  const[selCat,setSelCat]=useState(null);
  const[fcTab,setFcTab]=useState("spend");
  const[fcF,setFcF]=useState({amount:"",note:"",date:now.toISOString().slice(0,10)});
  const[wdF,setWdF]=useState({amount:"",note:"",date:now.toISOString().slice(0,10)});
  const[form,setForm]=useState({category:"Transport",subcategory:"Fuel",amount:"",note:"",date:now.toISOString().slice(0,10)});

  useEffect(function(){
    const t=ld(SK),s=ld(SK_S),f=ld(SK_F);
    const existing=t||[];
    const aids=APRIL.map(function(x){return x.id;});
    const merged=existing.filter(function(x){return aids.indexOf(x.id)===-1;}).concat(APRIL);
    setTxns(merged);sv(SK,merged);
    if(s)setSav(s);
    if(f)setFc(f);
  },[]);

  const yrs=Array.from({length:5},function(_,i){return now.getFullYear()-2+i;});
  const dd=function(m,y){return m===now.getMonth()&&y===now.getFullYear()?now.toISOString().slice(0,10):y+"-"+String(m+1).padStart(2,"0")+"-01";};
  const prevMo=function(){var m=mo===0?11:mo-1,y=mo===0?yr-1:yr;setMo(m);setYr(y);};
  const nextMo=function(){var m=mo===11?0:mo+1,y=mo===11?yr+1:yr;setMo(m);setYr(y);};

  const filt=useMemo(function(){return txns.filter(function(t){return sameMo(t.date,mo,yr);});},[txns,mo,yr]);
  const inc=useMemo(function(){return filt.filter(function(t){return t.category==="Income";}).reduce(function(s,t){return s+t.amount;},0);},[filt]);
  const exp=useMemo(function(){return filt.filter(function(t){return t.category!=="Income";}).reduce(function(s,t){return s+t.amount;},0);},[filt]);
  const stAmt=useMemo(function(){return parseFloat(sav[mkKey(mo,yr)]||0);},[sav,mo,yr]);
  const net=inc-exp-stAmt;
  const fcMo=Math.max(0,net);
  const sRate=inc>0?Math.max(0,(stAmt+fcMo)/inc*100):0;

  const catT=useMemo(function(){var m={};filt.filter(function(t){return t.category!=="Income";}).forEach(function(t){m[t.category]=(m[t.category]||0)+t.amount;});return Object.entries(m).sort(function(a,b){return b[1]-a[1];});},[filt]);
  const subM=useMemo(function(){var m={};filt.filter(function(t){return t.category!=="Income";}).forEach(function(t){var k=t.category+"__"+t.subcategory;m[k]=(m[k]||0)+t.amount;});return m;},[filt]);
  const incBd=useMemo(function(){var m={};filt.filter(function(t){return t.category==="Income";}).forEach(function(t){m[t.subcategory]=(m[t.subcategory]||0)+t.amount;});return Object.entries(m).sort(function(a,b){return b[1]-a[1];});},[filt]);
  const trend=useMemo(function(){return MO.map(function(_,i){return txns.filter(function(t){return sameMo(t.date,i,yr)&&t.category!=="Income";}).reduce(function(s,t){return s+t.amount;},0);});},[txns,yr]);
  const savTrend=useMemo(function(){return MO.map(function(_,i){var key=mkKey(i,yr),tgt=parseFloat(sav[key]||0),mo2=txns.filter(function(t){return sameMo(t.date,i,yr);}),i2=mo2.filter(function(t){return t.category==="Income";}).reduce(function(s,t){return s+t.amount;},0),e2=mo2.filter(function(t){return t.category!=="Income";}).reduce(function(s,t){return s+t.amount;},0);return{month:MO[i],target:tgt,net:i2-e2-tgt};});},[txns,sav,yr]);
  const fcMos=useMemo(function(){
    var res=[];
    for(var i=0;i<12;i++){
      var key=mkKey(i,yr),tgt=parseFloat(sav[key]||0);
      var mo2=txns.filter(function(t){return sameMo(t.date,i,yr)&&t.subcategory!=="Free Cash Withdrawal";});
      var i2=mo2.filter(function(t){return t.category==="Income";}).reduce(function(s,t){return s+t.amount;},0);
      var e2=mo2.filter(function(t){return t.category!=="Income";}).reduce(function(s,t){return s+t.amount;},0);
      var fca=Math.max(0,i2-e2-tgt);
      var ii=i;
      var ded=fc.filter(function(f){return f&&f.date&&sameMo(f.date,ii,yr);}).reduce(function(s,f){return s+parseFloat(f.amount||0);},0);
      if(i2>0||e2>0||ded>0)res.push({month:MO[i],idx:i,freeCash:fca,deducted:ded,remaining:fca-ded});
    }
    return res;
  },[txns,sav,fc,yr]);
  const tfca=fcMos.reduce(function(s,m){return s+m.freeCash;},0);
  const tded=fcMos.reduce(function(s,m){return s+m.deducted;},0);
  const tfcr=fcMos.reduce(function(s,m){return s+m.remaining;},0);
  const cmp=useMemo(function(){
    var gm=function(m){return txns.filter(function(t){return sameMo(t.date,m,cmpYr);});};
    var tA=gm(cmpA),tB=gm(cmpB);
    var sm=function(arr,isI){return arr.filter(function(t){return isI?t.category==="Income":t.category!=="Income";}).reduce(function(s,t){return s+t.amount;},0);};
    return{iA:sm(tA,true),iB:sm(tB,true),eA:sm(tA,false),eB:sm(tB,false),cats:EXP.map(function(c){return{cat:c,a:tA.filter(function(t){return t.category===c;}).reduce(function(s,t){return s+t.amount;},0),b:tB.filter(function(t){return t.category===c;}).reduce(function(s,t){return s+t.amount;},0)};}).filter(function(x){return x.a>0||x.b>0;})};
  },[txns,cmpA,cmpB,cmpYr]);
  const bMax=catT.length?catT[0][1]:1;

  function uf(k,v){setForm(function(f){var n=Object.assign({},f);n[k]=v;if(k==="category")n.subcategory=CATS[v].subs[0];return n;});}
  function submit(){
    if(!form.amount||isNaN(+form.amount)||+form.amount<=0)return;
    var cat=tab==="income"?"Income":form.category;
    var e={id:eid||String(Date.now()),category:cat,subcategory:form.subcategory,amount:parseFloat(form.amount),note:form.note,date:form.date};
    var u=eid?txns.map(function(t){return t.id===eid?e:t;}):[e].concat(txns);
    setTxns(u);sv(SK,u);setEid(null);
    setForm({category:"Transport",subcategory:"Fuel",amount:"",note:"",date:dd(mo,yr)});
    setView("main");
  }
  function startEdit(t){setEid(t.id);setForm({category:t.category,subcategory:t.subcategory,amount:String(t.amount),note:t.note||"",date:t.date});setView("add");}
  function delT(id){
    var t=txns.find(function(t){return t.id===id;});
    var u=txns.filter(function(t){return t.id!==id;});setTxns(u);sv(SK,u);
    if(t&&t.subcategory==="Free Cash Withdrawal"){
      var lid="fcwd_"+id.replace("wd_","");
      var uFc=fc.filter(function(f){return f.id!==lid;});setFc(uFc);sv(SK_F,uFc);
    }
  }
  function delSel(){var u=txns.filter(function(t){return sel.indexOf(t.id)===-1;});setTxns(u);sv(SK,u);setSel([]);setSelMode(false);}
  function togSel(id){setSel(function(s){return s.indexOf(id)!==-1?s.filter(function(x){return x!==id;}):[].concat(s,[id]);});}
  function togAll(list){var a=list.every(function(t){return sel.indexOf(t.id)!==-1;});if(a){setSel(function(s){return s.filter(function(x){return list.findIndex(function(t){return t.id===x;})===-1;});});}else{var ta=list.filter(function(t){return sel.indexOf(t.id)===-1;}).map(function(t){return t.id;});setSel(function(s){return s.concat(ta);});}}
  function saveST(i,y){var key=mkKey(i,y),v=parseFloat(savTgt)||0,u=Object.assign({},sav);u[key]=v;setSav(u);sv(SK_S,u);setEditSK(null);setSavTgt("");}
  function addFc(){if(!fcF.amount||isNaN(+fcF.amount)||+fcF.amount<=0)return;var e={id:String(Date.now()),amount:parseFloat(fcF.amount),note:fcF.note,date:fcF.date};var u=[e].concat(fc);setFc(u);sv(SK_F,u);setFcF({amount:"",note:"",date:now.toISOString().slice(0,10)});}
  function addWd(){
    if(!wdF.amount||isNaN(+wdF.amount)||+wdF.amount<=0)return;

            var key=mkKey(i,yr),isEd=editSK===key;
            return <div key={i} style={{padding:"10px 0",borderBottom:"1px solid #1a1a1a"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>
                <span style={{fontSize:13,fontWeight:600,color:"#e5e7eb",width:36}}>{row.month}</span>
                <div style={{display:"flex",gap:16,flex:1,justifyContent:"center",flexWrap:"wrap"}}>
                  <span style={{fontSize:12,color:"#6b7280"}}>Target: <span style={{color:"#c084fc",fontWeight:700}}>{row.target>0?fmt(row.target):"—"}</span></span>
                  <span style={{fontSize:12,color:"#6b7280"}}>Net: <span style={{color:row.net>=0?"#4ade80":"#f87171",fontWeight:700}}>{row.net<0?"-":""}{fmt(row.net)}</span></span>
                </div>
                <button style={D.pBtn} onClick={function(){setEditSK(key);setSavTgt(String(sav[key]||""));}}>🎯 Set</button>
              </div>
              {isEd&&<div style={{display:"flex",gap:8,marginTop:8,alignItems:"center",justifyContent:"center",flexWrap:"wrap"}}>
                <input style={Object.assign({},D.fInp,{width:140})} type="number" min="0" step="50" placeholder="Target RM" value={savTgt} onChange={function(e){setSavTgt(e.target.value);}}/>
                <button style={D.gBtn} onClick={function(){saveST(i,yr);}}>✅ Save</button>
                <button style={D.oBtn} onClick={function(){setEditSK(null);}}>✕</button>
              </div>}
            </div>;
          })}
        </div>
        <div style={D.card}>
          <div style={D.secL}>Trend</div><div style={D.secT}>Net balance trend {yr}</div>
          <Line pts={savTrend.map(function(r){return Math.max(0,r.net);})} color="#c084fc"/>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:5}}>{savTrend.map(function(r,i){return <div key={i} style={{textAlign:"center",flex:1}}><div style={{fontSize:9,color:"#4b5563"}}>{r.month}</div>{r.target>0&&<div style={{fontSize:9,color:"#c084fc"}}>{Math.round(r.target/100)/10}k</div>}</div>;})}</div>
        </div>
        {Footer}
      </div>}

      {tab==="freecash"&&<div>
        <div style={Object.assign({},D.mrow,{justifyContent:"center"})}><select style={D.sel} value={yr} onChange={function(e){setYr(+e.target.value);}}>{yrs.map(function(y){return <option key={y}>{y}</option>;})}</select></div>
        <div style={D.g2}>
          <div style={D.mc}><div style={D.mlbl}>🍋 Total free cash</div><div style={D.mv("#22d3ee")}>{fmt(tfca)}</div></div>
          <div style={D.mc}><div style={D.mlbl}>📤 Total deducted</div><div style={D.mv("#f87171")}>{fmt(tded)}</div></div>
          <div style={Object.assign({},D.mc,{gridColumn:"1 / -1"})}><div style={D.mlbl}>✅ Remaining</div><div style={D.mv(tfcr>=0?"#4ade80":"#f87171")}>{fmt(tfcr)}</div></div>
        </div>
        <div style={D.card}>
          <div style={D.secL}>Overview</div><div style={D.secT}>🍋 Free cash by month — {yr}</div>
          {fcMos.length===0&&<p style={{color:"#4b5563",fontSize:13,textAlign:"center",padding:"14px 0"}}>No data yet.</p>}
          {fcMos.map(function(row){return <div key={row.month} style={{padding:"10px 0",borderBottom:"1px solid #1a1a1a"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>
              <span style={{fontSize:13,fontWeight:600,color:"#e5e7eb",width:36}}>{row.month}</span>
              <div style={{display:"flex",gap:14,flex:1,justifyContent:"center",flexWrap:"wrap"}}>
                <span style={{fontSize:12,color:"#6b7280"}}>Free: <span style={{color:"#22d3ee",fontWeight:700}}>{fmt(row.freeCash)}</span></span>
                <span style={{fontSize:12,color:"#6b7280"}}>Deducted: <span style={{color:"#f87171",fontWeight:700}}>{fmt(row.deducted)}</span></span>
                <span style={{fontSize:12,color:"#6b7280"}}>Left: <span style={{color:row.remaining>=0?"#4ade80":"#f87171",fontWeight:700}}>{fmt(row.remaining)}</span></span>
              </div>
            </div>
          </div>;})}
        </div>
        <div style={D.segR}>
          <button style={D.seg(fcTab==="spend","#fb923c")} onClick={function(){setFcTab("spend");}}>🛍️ Spending</button>
          <button style={D.seg(fcTab==="withdraw","#4ade80")} onClick={function(){setFcTab("withdraw");}}>💰 Withdraw to Income</button>
        </div>
        {fcTab==="spend"&&<div style={D.card}>
          <div style={D.secL}>Spending</div><div style={D.secT}>Record free cash spending</div>
          <div style={D.fGrp}><label style={D.fLbl}>Date</label><input style={D.fInp} type="date" value={fcF.date} onChange={function(e){setFcF(function(f){return Object.assign({},f,{date:e.target.value});});}}/></div>
          <div style={D.fGrp}><label style={D.fLbl}>Amount (RM)</label><input style={D.fInp} type="number" min="0" step="0.01" placeholder="0.00" value={fcF.amount} onChange={function(e){setFcF(function(f){return Object.assign({},f,{amount:e.target.value});});}}/></div>
          <div style={D.fGrp}><label style={D.fLbl}>Note</label><input style={D.fInp} type="text" placeholder="What did you spend on?" value={fcF.note} onChange={function(e){setFcF(function(f){return Object.assign({},f,{note:e.target.value});});}}/></div>
          <button style={D.sBtn} onClick={addFc}>🍋 Record Spending</button>
        </div>}
        {fcTab==="withdraw"&&<div style={D.card}>
          <div style={D.secL}>Withdrawal</div><div style={D.secT}>💰 Withdraw to Income</div>
          <p style={{fontSize:12,color:"#6b7280",textAlign:"center",marginBottom:14}}>Adds amount to income to cover any shortfall.</p>
          <div style={D.fGrp}><label style={D.fLbl}>Date</label><input style={D.fInp} type="date" value={wdF.date} onChange={function(e){setWdF(function(f){return Object.assign({},f,{date:e.target.value});});}}/></div>
          <div style={D.fGrp}><label style={D.fLbl}>Amount (RM)</label><input style={D.fInp} type="number" min="0" step="0.01" placeholder="0.00" value={wdF.amount} onChange={function(e){setWdF(function(f){return Object.assign({},f,{amount:e.target.value});});}}/></div>
          <div style={D.fGrp}><label style={D.fLbl}>Note (optional)</label><input style={D.fInp} type="text" placeholder="Reason for withdrawal..." value={wdF.note} onChange={function(e){setWdF(function(f){return Object.assign({},f,{note:e.target.value});});}}/></div>
          <button style={Object.assign({},D.sBtn,{background:"#4ade80"})} onClick={addWd}>💰 Withdraw to Income</button>
        </div>}
        {fc.length>0&&<div style={D.card}>
          <div style={D.secL}>History</div><div style={D.secT}>Free cash history</div>
          {[].concat(fc).sort(function(a,b){return new Date(b.date)-new Date(a.date);}).map(function(f){return(
            <div key={f.id} style={D.txR}>
              <div style={D.chp(f.isWithdrawal?"#4ade80":"#22d3ee")}><span>{f.isWithdrawal?"💰":"🍋"}</span></div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:500,color:"#e5e7eb"}}>{f.note||"Free cash spend"}</div>
                <div style={{fontSize:11,color:"#4b5563"}}>{f.date}{f.isWithdrawal?" · To income":""}</div>
              </div>
              <span style={{fontSize:13,fontWeight:600,color:f.isWithdrawal?"#4ade80":"#f87171",width:90,textAlign:"right",flexShrink:0}}>{f.isWithdrawal?"+":"-"}{fmt(f.amount)}</span>
              <button onClick={function(){delFc(f.id);}} style={D.dBtn}>🗑️</button>
            </div>
          );})}
        </div>}
        {Footer}
      </div>}

      {tab==="comparison"&&<div>
        <div style={Object.assign({},D.mrow,{justifyContent:"center",gap:10,flexWrap:"wrap"})}>
          <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:11,color:"#6b7280"}}>Year</span><select style={D.sel} value={cmpYr} onChange={function(e){setCmpYr(+e.target.value);}}>{yrs.map(function(y){return <option key={y}>{y}</option>;})}</select></div>
          <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{width:10,height:10,borderRadius:2,background:"#60a5fa",display:"inline-block"}}></span><select style={D.sel} value={cmpA} onChange={function(e){setCmpA(+e.target.value);}}>{MO.map(function(m,i){return <option key={i} value={i}>{m}</option>;})}</select></div>
          <span style={{color:"#4b5563",fontWeight:700}}>vs</span>
          <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{width:10,height:10,borderRadius:2,background:"#c084fc",display:"inline-block"}}></span><select style={D.sel} value={cmpB} onChange={function(e){setCmpB(+e.target.value);}}>{MO.map(function(m,i){return <option key={i} value={i}>{m}</option>;})}</select></div>
        </div>
        <div style={D.g2}>
          <div style={D.mc}><div style={D.mlbl}>{MO[cmpA]+" income"}</div><div style={D.mv("#60a5fa")}>{fmt(cmp.iA)}</div></div>
          <div style={D.mc}><div style={D.mlbl}>{MO[cmpB]+" income"}</div><div style={D.mv("#c084fc")}>{fmt(cmp.iB)}</div></div>
          <div style={D.mc}><div style={D.mlbl}>{MO[cmpA]+" exp"}</div><div style={D.mv("#60a5fa")}>{fmt(cmp.eA)}</div></div>
          <div style={D.mc}><div style={D.mlbl}>{MO[cmpB]+" exp"}</div><div style={D.mv("#c084fc")}>{fmt(cmp.eB)}</div></div>
        </div>
        <div style={D.card}>
          <div style={D.secL}>Category</div><div style={D.secT}>Category comparison</div>
          {cmp.cats.length===0&&<p style={{color:"#4b5563",fontSize:13,textAlign:"center",padding:"14px 0"}}>No data for these months.</p>}
          {cmp.cats.map(function(x){var m=CATS[x.cat],mx=Math.max(x.a,x.b,1);return(
            <div key={x.cat} style={{marginBottom:14}}>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6,justifyContent:"center"}}><span>{m.emoji}</span><span style={{fontSize:13,fontWeight:600,color:"#e5e7eb"}}>{x.cat}</span></div>
              <div style={{display:"flex",flexDirection:"column",gap:4}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:11,color:"#60a5fa",width:32,textAlign:"right",flexShrink:0}}>{MO[cmpA]}</span><div style={D.bTrk}><div style={D.bFil("#60a5fa",(x.a/mx)*100)}></div></div><span style={{fontSize:12,color:"#9ca3af",width:80,textAlign:"right",flexShrink:0}}>{fmt(x.a)}</span></div>
                <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:11,color:"#c084fc",width:32,textAlign:"right",flexShrink:0}}>{MO[cmpB]}</span><div style={D.bTrk}><div style={D.bFil("#c084fc",(x.b/mx)*100)}></div></div><span style={{fontSize:12,color:"#9ca3af",width:80,textAlign:"right",flexShrink:0}}>{fmt(x.b)}</span></div>
                {x.a>0&&x.b>0&&<div style={{fontSize:11,color:x.b>x.a?"#f87171":"#4ade80",textAlign:"center",marginTop:2}}>{x.b>x.a?"📈":"📉"} {Math.abs(((x.b-x.a)/x.a)*100).toFixed(1)}{"% "}{x.b>x.a?"more":"less"}{" than "}{MO[cmpA]}</div>}
              </div>
            </div>
          );})}
        </div>
        <div style={D.card}>
          <div style={D.secL}>Summary</div><div style={D.secT}>Summary comparison</div>
          {[{l:"Income",a:cmp.iA,b:cmp.iB},{l:"Expenses",a:cmp.eA,b:cmp.eB},{l:"Net",a:cmp.iA-cmp.eA,b:cmp.iB-cmp.eB}].map(function(row){
            var mx=Math.max(Math.abs(row.a),Math.abs(row.b),1);
            return <div key={row.l} style={{marginBottom:12}}>
              <div style={{fontSize:11,fontWeight:600,color:"#6b7280",marginBottom:6,textAlign:"center",textTransform:"uppercase",letterSpacing:"0.05em"}}>{row.l}</div>
              <div style={{display:"flex",flexDirection:"column",gap:4}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:11,color:"#60a5fa",width:32,textAlign:"right",flexShrink:0}}>{MO[cmpA]}</span><div style={D.bTrk}><div style={D.bFil("#60a5fa",(Math.abs(row.a)/mx)*100)}></div></div><span style={{fontSize:12,color:"#9ca3af",width:80,textAlign:"right",flexShrink:0}}>{row.a<0?"-":""}{fmt(row.a)}</span></div>
                <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:11,color:"#c084fc",width:32,textAlign:"right",flexShrink:0}}>{MO[cmpB]}</span><div style={D.bTrk}><div style={D.bFil("#c084fc",(Math.abs(row.b)/mx)*100)}></div></div><span style={{fontSize:12,color:"#9ca3af",width:80,textAlign:"right",flexShrink:0}}>{row.b<0?"-":""}{fmt(row.b)}</span></div>
              </div>
            </div>;
          })}
        </div>
        {Footer}
      </div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
