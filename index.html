<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>💎 Finance Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.3/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#0f0f0f;color:#e5e7eb;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;}
select,input,button{font-family:inherit;font-size:13px;}
button{cursor:pointer;}
button:active{opacity:0.8;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:#374151;border-radius:2px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const{useState,useEffect,useMemo}=React;

const CATS={
  Income:       {subs:["Salary","Investments","Part Time","Other"],                                                          color:"#4ade80",bg:"#052e16",emoji:"💰"},
  Transport:    {subs:["Car Loan","Fuel","Parking/Tolls","Maintenance","Other"],                                             color:"#60a5fa",bg:"#1e3a5f",emoji:"🚗"},
  "F&B":        {subs:["Groceries","Dine Out","Snacks","Other"],                                                             color:"#fb923c",bg:"#431407",emoji:"🍽️"},
  Personal:     {subs:["Personal Care","Wears","Fitness","Subscriptions","Entertainment","Hobbies","Other"],                 color:"#c084fc",bg:"#3b0764",emoji:"✨"},
  Health:       {subs:["Medical","Supplements","Health Insurance","Other"],                                                  color:"#f472b6",bg:"#500724",emoji:"❤️"},
  Housing:      {subs:["Rental","Electricity Bill","Water Bill","Gas Bill","Internet Bill","Laundry","Home Supplies","Other"],color:"#34d399",bg:"#022c22",emoji:"🏠"},
  Social:       {subs:["Gifts","Events","Other"],                                                                            color:"#22d3ee",bg:"#083344",emoji:"👥"},
  Miscellaneous:{subs:["Other"],                                                                                             color:"#facc15",bg:"#422006",emoji:"📦"},
};
const EXP_CATS=["Transport","F&B","Personal","Health","Housing","Social","Miscellaneous"];
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const FMONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const PIE_CLR=["#60a5fa","#fb923c","#c084fc","#f472b6","#34d399","#22d3ee","#facc15","#4ade80"];
const fmt=n=>"RM "+Math.abs(n).toLocaleString("en-MY",{minimumFractionDigits:2,maximumFractionDigits:2});
const SK="ft_v6",SK_S="ft_sav_v6",SK_F="ft_fc_v6";
const ld=k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}};
const sv=( k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};
const mkKey=(m,y)=>`${y}-${String(m+1).padStart(2,"0")}`;
const pd=s=>new Date(s+"T00:00:00");

function Pie({data,size=140}){
  if(!data||!data.length)return null;
  const tot=data.reduce((s,d)=>s+d.v,0);
  if(!tot)return null;
  let cum=0;
  const sl=data.map((d,i)=>{
    const p=d.v/tot,a1=cum*2*Math.PI-Math.PI/2,a2=(cum+p)*2*Math.PI-Math.PI/2;
    cum+=p;
    const r=size/2-4,cx=size/2,cy=size/2;
    return{d:`M${cx},${cy} L${cx+r*Math.cos(a1)},${cy+r*Math.sin(a1)} A${r},${r},0,${p>0.5?1:0},1,${cx+r*Math.cos(a2)},${cy+r*Math.sin(a2)} Z`,c:PIE_CLR[i%PIE_CLR.length],p:Math.round(p*100)};
  });
  return <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>{sl.map((s,i)=><path key={i} d={s.d} fill={s.c} stroke="#111827" strokeWidth={1.5}/>)}<circle cx={size/2} cy={size/2} r={size/4} fill="#111827"/></svg>;
}

function Line({pts,color="#4ade80"}){
  if(!pts||pts.length<2)return null;
  const w=300,h=60,p=8,mx=Math.max(...pts,1);
  const xs=pts.map((_,i)=>p+(i/(pts.length-1))*(w-p*2));
  const ys=pts.map(v=>h-p-(v/mx)*(h-p*2));
  return <svg width="100%" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" style={{display:"block"}}><polyline points={xs.map((x,i)=>`${x},${ys[i]}`).join(" ")} fill="none" stroke={color} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"/>{xs.map((x,i)=><circle key={i} cx={x} cy={ys[i]} r={3} fill={color}/>)}</svg>;
}

const NAV=[{id:"summary",l:"Summary",e:"📊"},{id:"income",l:"Income",e:"💰"},{id:"expenses",l:"Expenses",e:"💸"},{id:"savings",l:"Savings",e:"🏦"},{id:"freecash",l:"Free Cash",e:"💵"},{id:"comparison",l:"Comparison",e:"📈"}];

const S={
  wrap:{background:"#0f0f0f",minHeight:"100vh",padding:"16px",maxWidth:680,margin:"0 auto"},
  card:{background:"#1a1a2e",border:"1px solid #2d2d44",borderRadius:14,padding:"16px 18px",marginBottom:12},
  mcard:{background:"#1a1a2e",border:"1px solid #2d2d44",borderRadius:14,padding:"14px 16px",textAlign:"center"},
  grid:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:10,marginBottom:14},
  ctitle:{fontSize:11,fontWeight:600,color:"#6b7280",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:14,textAlign:"center"},
  mlbl:{fontSize:11,color:"#6b7280",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6},
  sel:{padding:"7px 10px",borderRadius:8,border:"1px solid #374151",background:"#1f2937",color:"#e5e7eb"},
  mrow:{display:"flex",gap:8,marginBottom:14,alignItems:"center",flexWrap:"wrap",justifyContent:"center"},
  navWrap:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginBottom:20},
  fLabel:{fontSize:12,color:"#9ca3af",display:"block",marginBottom:5,textAlign:"center"},
  fInput:{width:"100%",padding:"9px 12px",borderRadius:10,border:"1px solid #374151",background:"#111827",color:"#e5e7eb",fontSize:14,textAlign:"center"},
  fGroup:{marginBottom:14},
  txRow:{display:"flex",alignItems:"center",gap:10,padding:"11px 6px",borderBottom:"1px solid #1f2937"},
  bTrack:{flex:1,height:8,borderRadius:4,background:"#374151",overflow:"hidden"},
  bAmt:{fontSize:12,color:"#9ca3af",width:85,textAlign:"right",flexShrink:0},
  bLabel:{fontSize:13,width:85,color:"#9ca3af",flexShrink:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"},
  barRow:{display:"flex",alignItems:"center",gap:10,marginBottom:10},
  subGrid:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(155px,1fr))",gap:10},
};

const btn=(bg,border,color,extra={})=>({padding:"8px 14px",borderRadius:9,border:`1px solid ${border}`,background:bg,color,display:"inline-flex",alignItems:"center",gap:5,...extra});
const Btn={
  out: btn("#1f2937","#374151","#9ca3af"),
  del: btn("#1f2937","#7f1d1d","#f87171"),
  grn: btn("#14532d","#166534","#4ade80",{fontWeight:500}),
  add: btn("#312e81","#4f46e5","#c7d2fe",{fontWeight:500}),
  pur: btn("#3b0764","#5b21b6","#c084fc"),
  sav: {width:"100%",padding:11,marginTop:6,background:"#4f46e5",color:"#fff",border:"1px solid #6366f1",borderRadius:10,fontWeight:600,fontSize:14},
  nav: a=>({padding:"10px 6px",borderRadius:10,border:a?"2px solid #6366f1":"1px solid #374151",background:a?"#1e1b4b":"#1f2937",color:a?"#a5b4fc":"#9ca3af",fontWeight:a?600:400,display:"flex",flexDirection:"column",alignItems:"center",gap:3,fontSize:12,textAlign:"center"}),
  seg: (a,c)=>({flex:1,padding:10,textAlign:"center",fontSize:13,fontWeight:a?600:400,background:a?c+"33":"transparent",color:a?c:"#6b7280",border:"none"}),
};

function App(){
  const now=new Date();
  const[txns,setTxns]=useState([]);
  const[sav,setSav]=useState({});
  const[fc,setFc]=useState([]);
  const[ready,setRdy]=useState(false);
  const[tab,setTab]=useState("summary");
  const[view,setView]=useState("main");
  const[mo,setMo]=useState(now.getMonth());
  const[yr,setYr]=useState(now.getFullYear());
  const[editId,setEid]=useState(null);
  const[selMode,setSelMode]=useState(false);
  const[sel,setSel]=useState([]);
  const[savTgt,setSavTgt]=useState("");
  const[editSavK,setEditSavK]=useState(null);
  const[cmpA,setCmpA]=useState(now.getMonth()===0?11:now.getMonth()-1);
  const[cmpB,setCmpB]=useState(now.getMonth());
  const[cmpYr,setCmpYr]=useState(now.getFullYear());
  const[expMo,setExpMo]=useState(now.getMonth());
  const[expYr,setExpYr]=useState(now.getFullYear());
  const[fcF,setFcF]=useState({amount:"",note:"",date:now.toISOString().slice(0,10)});
  const[form,setForm]=useState({category:"Transport",subcategory:"Fuel",amount:"",note:"",date:now.toISOString().slice(0,10)});

  useEffect(()=>{setTxns(ld(SK)||[]);setSav(ld(SK_S)||{});setFc(ld(SK_F)||[]);setRdy(true);},[]);

  const yrs=Array.from({length:5},(_,i)=>now.getFullYear()-2+i);
  const dd=(m,y)=>m===now.getMonth()&&y===now.getFullYear()?now.toISOString().slice(0,10):`${y}-${String(m+1).padStart(2,"0")}-01`;

  const filt=useMemo(()=>txns.filter(t=>{const d=pd(t.date);return d.getMonth()===mo&&d.getFullYear()===yr;}),[txns,mo,yr]);
  const inc=useMemo(()=>filt.filter(t=>t.category==="Income").reduce((s,t)=>s+t.amount,0),[filt]);
  const exp=useMemo(()=>filt.filter(t=>t.category!=="Income").reduce((s,t)=>s+t.amount,0),[filt]);
  const savTgtAmt=useMemo(()=>parseFloat(sav[mkKey(mo,yr)]||0),[sav,mo,yr]);
  const net=inc-exp-savTgtAmt;
  const fcMo=Math.max(0,net);

  const catTots=useMemo(()=>{const m={};filt.filter(t=>t.category!=="Income").forEach(t=>{m[t.category]=(m[t.category]||0)+t.amount;});return Object.entries(m).sort((a,b)=>b[1]-a[1]);},[filt]);
  const subMap=useMemo(()=>{const m={};filt.filter(t=>t.category!=="Income").forEach(t=>{const k=`${t.category}__${t.subcategory}`;m[k]=(m[k]||0)+t.amount;});return m;},[filt]);
  const incBd=useMemo(()=>{const m={};filt.filter(t=>t.category==="Income").forEach(t=>{m[t.subcategory]=(m[t.subcategory]||0)+t.amount;});return Object.entries(m).sort((a,b)=>b[1]-a[1]);},[filt]);
  const trend=useMemo(()=>MONTHS.map((_,i)=>txns.filter(t=>{const d=pd(t.date);return d.getMonth()===i&&d.getFullYear()===yr&&t.category!=="Income";}).reduce((s,t)=>s+t.amount,0)),[txns,yr]);
  const savTrend=useMemo(()=>MONTHS.map((_,i)=>{
    const key=mkKey(i,yr),tgt=parseFloat(sav[key]||0);
    const mo2=txns.filter(t=>{const d=pd(t.date);return d.getMonth()===i&&d.getFullYear()===yr;});
    const i2=mo2.filter(t=>t.category==="Income").reduce((s,t)=>s+t.amount,0);
    const e2=mo2.filter(t=>t.category!=="Income").reduce((s,t)=>s+t.amount,0);
    return{month:MONTHS[i],target:tgt,net:i2-e2-tgt};
  }),[txns,sav,yr]);
  const fcMonths=useMemo(()=>{
    const res=[];
    for(let i=0;i<12;i++){
      const key=mkKey(i,yr),tgt=parseFloat(sav[key]||0);
      const mo2=txns.filter(t=>{const d=pd(t.date);return d.getMonth()===i&&d.getFullYear()===yr;});
      const i2=mo2.filter(t=>t.category==="Income").reduce((s,t)=>s+t.amount,0);
      const e2=mo2.filter(t=>t.category!=="Income").reduce((s,t)=>s+t.amount,0);
      const fca=Math.max(0,i2-e2-tgt);
      const used=fc.filter(f=>{const d=pd(f.date);return d.getMonth()===i&&d.getFullYear()===yr;}).reduce((s,f)=>s+parseFloat(f.amount||0),0);
      if(i2>0||e2>0)res.push({month:MONTHS[i],idx:i,freeCash:fca,used,remaining:fca-used});
    }
    return res;
  },[txns,sav,fc,yr]);
  const tfca=fcMonths.reduce((s,m)=>s+m.freeCash,0);
  const tfcu=fcMonths.reduce((s,m)=>s+m.used,0);
  const tfcr=fcMonths.reduce((s,m)=>s+m.remaining,0);
  const cmp=useMemo(()=>{
    const gm=m=>txns.filter(t=>{const d=pd(t.date);return d.getMonth()===m&&d.getFullYear()===cmpYr;});
    const tA=gm(cmpA),tB=gm(cmpB);
    const sm=(arr,isI)=>arr.filter(t=>isI?t.category==="Income":t.category!=="Income").reduce((s,t)=>s+t.amount,0);
    return{iA:sm(tA,true),iB:sm(tB,true),eA:sm(tA,false),eB:sm(tB,false),cats:EXP_CATS.map(c=>({cat:c,a:tA.filter(t=>t.category===c).reduce((s,t)=>s+t.amount,0),b:tB.filter(t=>t.category===c).reduce((s,t)=>s+t.amount,0)})).filter(x=>x.a>0||x.b>0)};
  },[txns,cmpA,cmpB,cmpYr]);

  const bMax=catTots.length?catTots[0][1]:1;
  const savRate=inc>0?Math.max(0,(savTgtAmt+fcMo)/inc*100):0;

  function uf(k,v){setForm(f=>{const n={...f,[k]:v};if(k==="category")n.subcategory=CATS[v].subs[0];return n;});}
  function submit(){
    if(!form.amount||isNaN(+form.amount)||+form.amount<=0)return;
    const cat=tab==="income"?"Income":form.category;
    const e={id:editId||String(Date.now()),category:cat,subcategory:form.subcategory,amount:parseFloat(form.amount),note:form.note,date:form.date};
    const u=editId?txns.map(t=>t.id===editId?e:t):[e,...txns];
    setTxns(u);sv(SK,u);setEid(null);
    setForm({category:tab==="income"?"Income":"Transport",subcategory:tab==="income"?"Salary":"Fuel",amount:"",note:"",date:dd(mo,yr)});
    setView("main");
  }
  function startEdit(t){setEid(t.id);setForm({category:t.category,subcategory:t.subcategory,amount:String(t.amount),note:t.note||"",date:t.date});setView("add");}
  function delTxn(id){const u=txns.filter(t=>t.id!==id);setTxns(u);sv(SK,u);}
  function delSel(){const u=txns.filter(t=>sel.indexOf(t.id)===-1);setTxns(u);sv(SK,u);setSel([]);setSelMode(false);}
  function togSel(id){setSel(s=>s.indexOf(id)!==-1?s.filter(x=>x!==id):[...s,id]);}
  function togAll(list){const a=list.every(t=>sel.indexOf(t.id)!==-1);if(a){setSel(s=>s.filter(x=>list.findIndex(t=>t.id===x)===-1));}else{const ta=list.filter(t=>sel.indexOf(t.id)===-1).map(t=>t.id);setSel(s=>[...s,...ta]);}}
  function saveSavTgt(i,y){const key=mkKey(i,y),v=parseFloat(savTgt)||0,u={...sav,[key]:v};setSav(u);sv(SK_S,u);setEditSavK(null);setSavTgt("");}
  function addFc(){if(!fcF.amount||isNaN(+fcF.amount)||+fcF.amount<=0)return;const e={id:String(Date.now()),amount:parseFloat(fcF.amount),note:fcF.note,date:fcF.date};const u=[e,...fc];setFc(u);sv(SK_F,u);setFcF({amount:"",note:"",date:now.toISOString().slice(0,10)});}
  function delFc(id){const u=fc.filter(f=>f.id!==id);setFc(u);sv(SK_F,u);}

  function expBk(){
    try{
      const bk={version:1,txns,savings:sav,fcTxns:fc,exportedAt:new Date().toISOString()};
      const blob=new Blob([JSON.stringify(bk,null,2)],{type:"application/json"});
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");a.href=url;a.download="finance_backup_"+new Date().toISOString().slice(0,10)+".json";
      document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(url);document.body.removeChild(a);},100);
    }catch{
      const bk={version:1,txns,savings:sav,fcTxns:fc};
      const a=document.createElement("a");a.setAttribute("href","data:application/json;charset=utf-8,"+encodeURIComponent(JSON.stringify(bk)));a.setAttribute("download","finance_backup.json");document.body.appendChild(a);a.click();document.body.removeChild(a);
    }
  }
  function impBk(e){
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(!d.version||!d.txns){alert("Invalid backup.");return;}setTxns(d.txns||[]);sv(SK,d.txns||[]);setSav(d.savings||{});sv(SK_S,d.savings||{});setFc(d.fcTxns||[]);sv(SK_F,d.fcTxns||[]);alert("✅ Restored! "+( d.txns||[]).length+" transactions loaded.");}catch{alert("Failed to read file.");}};
    r.readAsText(file);e.target.value="";
  }
  function expCSV(){
    const rows=txns.filter(t=>{const d=pd(t.date);return d.getMonth()===expMo&&d.getFullYear()===expYr;});
    const lines=["Date,Category,Subcategory,Amount,Note",...rows.map(r=>[r.date,r.category,r.subcategory,r.amount,'"'+(r.note||"")+'"'].join(","))];
    const a=document.createElement("a");a.setAttribute("href","data:text/csv;charset=utf-8,"+encodeURIComponent(lines.join("\n")));a.setAttribute("download","finance_"+MONTHS[expMo]+"_"+expYr+".csv");document.body.appendChild(a);a.click();document.body.removeChild(a);
  }

  if(!ready)return <div style={{background:"#0f0f0f",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:"#6b7280"}}>⏳ Loading...</div>;

  if(view==="add"){
    const isI=tab==="income";
    const cats=isI?["Income"]:EXP_CATS;
    const subs=isI?CATS.Income.subs:(CATS[form.category]?.subs||[]);
    return(
      <div style={S.wrap}>
        <div style={{textAlign:"center",marginBottom:16}}><div style={{fontSize:20,fontWeight:600,color:"#f9fafb",marginBottom:8}}>{editId?"✏️ Edit":"➕ Add"} {isI?"Income":"Expense"}</div><button style={Btn.out} onClick={()=>{setView("main");setEid(null);}}>← Back</button></div>
        <div style={S.card}>
          <div style={{textAlign:"center",marginBottom:16}}><span style={{fontSize:32}}>{isI?"💰":"💸"}</span><div style={{fontSize:13,color:isI?"#4ade80":"#f87171",fontWeight:600,marginTop:4}}>{isI?"Adding Income":"Adding Expense"}</div></div>
          {!isI&&<div style={S.fGroup}><label style={S.fLabel}>Category</label><select style={S.fInput} value={form.category} onChange={e=>uf("category",e.target.value)}>{cats.map(c=><option key={c}>{c}</option>)}</select></div>}
          <div style={S.fGroup}><label style={S.fLabel}>Subcategory</label><select style={S.fInput} value={form.subcategory} onChange={e=>uf("subcategory",e.target.value)}>{subs.map(s=><option key={s}>{s}</option>)}</select></div>
          <div style={S.fGroup}><label style={S.fLabel}>Date</label><input style={S.fInput} type="date" value={form.date} onChange={e=>uf("date",e.target.value)}/></div>
          <div style={S.fGroup}><label style={S.fLabel}>Amount (RM)</label><input style={S.fInput} type="number" min="0" step="0.01" placeholder="0.00" value={form.amount} onChange={e=>uf("amount",e.target.value)}/></div>
          <div style={S.fGroup}><label style={S.fLabel}>Note (optional)</label><input style={S.fInput} type="text" placeholder="Add a note…" value={form.note} onChange={e=>uf("note",e.target.value)}/></div>
          <button style={Btn.sav} onClick={submit}>{editId?"💾 Save Changes":"✅ Add Transaction"}</button>
        </div>
      </div>
    );
  }

  function TxRow({t,showEdit=true}){
    const m=CATS[t.category];
    const isSel=sel.indexOf(t.id)!==-1;
    return(
      <div style={{...S.txRow,background:isSel?"#1e1b4b":"transparent",cursor:selMode?"pointer":"default",borderRadius:isSel?8:0}} onClick={selMode?()=>togSel(t.id):undefined}>
        {selMode&&<div style={{width:18,height:18,borderRadius:4,border:"2px solid "+(isSel?"#6366f1":"#4b5563"),background:isSel?"#6366f1":"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#fff"}}>{isSel?"✓":""}</div>}
        <div style={{width:34,height:34,borderRadius:10,background:m.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>{m.emoji}</div>
        <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:500,color:"#e5e7eb"}}>{t.subcategory}{t.note?" · "+t.note:""}</div><div style={{fontSize:11,color:"#4b5563"}}>{t.date}</div></div>
        <span style={{fontSize:11,padding:"3px 8px",borderRadius:20,background:m.bg+"aa",color:m.color,fontWeight:500,flexShrink:0}}>{t.category}</span>
        <span style={{fontSize:13,fontWeight:600,color:t.category==="Income"?"#4ade80":"#f87171",width:90,textAlign:"right",flexShrink:0}}>{t.category==="Income"?"+":"-"}{fmt(t.amount)}</span>
        {showEdit&&!selMode&&<span style={{display:"inline-flex",gap:4}}><button onClick={e=>{e.stopPropagation();startEdit(t);}} style={Btn.out}>✏️</button><button onClick={e=>{e.stopPropagation();delTxn(t.id);}} style={Btn.del}>🗑️</button></span>}
      </div>
    );
  }

  function SelBar({list}){
    const allS=list.length>0&&list.every(t=>sel.indexOf(t.id)!==-1);
    return(
      <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap",justifyContent:"center"}}>
        {!selMode?<button style={Btn.out} onClick={()=>{setSelMode(true);setSel([]);}}>☑️ Select</button>
        :<span style={{display:"inline-flex",gap:8,flexWrap:"wrap",justifyContent:"center"}}>
          <button style={Btn.out} onClick={()=>togAll(list)}>{allS?"Deselect all":"Select all"}</button>
          <button style={{...Btn.del,background:sel.length>0?"#7f1d1d":"#1f2937",color:sel.length>0?"#fff":"#6b7280"}} onClick={()=>{if(sel.length>0)delSel();}}>{"🗑️ Delete"+(sel.length>0?" ("+sel.length+")":"")}</button>
          <button style={Btn.out} onClick={()=>{setSelMode(false);setSel([]);}}>✕ Cancel</button>
        </span>}
      </div>
    );
  }

  function MCard({label,value,color}){return <div style={S.mcard}><div style={S.mlbl}>{label}</div><div style={{fontSize:18,fontWeight:600,color}}>{value}</div></div>;}
  function BRow({emoji,bg,color,label,pct,amt}){return <div style={S.barRow}><div style={{width:28,height:28,borderRadius:8,background:bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>{emoji}</div><div style={S.bLabel}>{label}</div><div style={S.bTrack}><div style={{height:"100%",width:Math.min(100,Math.max(0,pct))+"%",background:color,borderRadius:4}}></div></div><div style={S.bAmt}>{amt}</div></div>;}

  return(
    <div style={S.wrap}>
      <div style={{textAlign:"center",marginBottom:20}}>
        <div style={{fontSize:22,fontWeight:700,color:"#f9fafb"}}>💎 Finance Tracker</div>
        <div style={{fontSize:11,color:"#4b5563",marginTop:3}}>{FMONTHS[mo]} {yr}</div>
      </div>

      <div style={S.navWrap}>
        {NAV.map(n=><button key={n.id} style={Btn.nav(tab===n.id)} onClick={()=>{setTab(n.id);setSelMode(false);setSel([]);}}><span style={{fontSize:18}}>{n.e}</span><span>{n.l}</span></button>)}
      </div>

      {tab!=="comparison"&&tab!=="freecash"&&(
        <div style={S.mrow}>
          <select style={S.sel} value={mo} onChange={e=>setMo(+e.target.value)}>{MONTHS.map((m,i)=><option key={i} value={i}>{m}</option>)}</select>
          <select style={S.sel} value={yr} onChange={e=>setYr(+e.target.value)}>{yrs.map(y=><option key={y}>{y}</option>)}</select>
          {tab==="income"&&<button style={Btn.grn} onClick={()=>{setForm({category:"Income",subcategory:"Salary",amount:"",note:"",date:dd(mo,yr)});setView("add");}}>➕ Add Income</button>}
          {tab==="expenses"&&<button style={Btn.add} onClick={()=>{setForm({category:"Transport",subcategory:"Fuel",amount:"",note:"",date:dd(mo,yr)});setView("add");}}>➕ Add Expense</button>}
        </div>
      )}

      {tab==="summary"&&<div>
        <div style={S.grid}>
          <MCard label="💰 Income" value={fmt(inc)} color="#4ade80"/>
          <MCard label="💸 Expenses" value={fmt(exp)} color="#f87171"/>
          <MCard label="🏦 Savings" value={fmt(savTgtAmt)} color="#c084fc"/>
          <MCard label="🏷️ Net Balance" value={(net<0?"-":"")+fmt(net)} color={net>=0?"#60a5fa":"#f87171"}/>
          {inc>0&&<MCard label="📈 Savings Rate" value={savRate.toFixed(1)+"%"} color="#facc15"/>}
        </div>
        {catTots.length>0&&<div style={S.card}>
          <div style={S.ctitle}>📊 Expenses breakdown</div>
          <div style={{display:"flex",justifyContent:"center",marginBottom:16}}><Pie data={catTots.map(x=>({label:x[0],v:x[1]}))} size={150}/></div>
          <div style={{display:"flex",flexWrap:"wrap",gap:"6px 14px",justifyContent:"center",marginBottom:14}}>
            {catTots.map((x,i)=><div key={x[0]} style={{display:"flex",alignItems:"center",gap:5,fontSize:12,color:"#9ca3af"}}><span style={{width:10,height:10,borderRadius:2,background:PIE_CLR[i%PIE_CLR.length],display:"inline-block"}}></span>{x[0]} ({exp>0?Math.round(x[1]/exp*100):0}%)</div>)}
          </div>
          {catTots.map(x=><BRow key={x[0]} emoji={CATS[x[0]].emoji} bg={CATS[x[0]].bg} color={CATS[x[0]].color} label={x[0]} pct={(x[1]/bMax)*100} amt={fmt(x[1])}/>)}
        </div>}
        <div style={S.card}>
          <div style={S.ctitle}>📉 Expense trend {yr}</div>
          <Line pts={trend} color="#f87171"/>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>{trend.map((v,i)=><div key={i} style={{textAlign:"center",flex:1}}><div style={{fontSize:9,color:"#4b5563"}}>{MONTHS[i]}</div>{v>0&&<div style={{fontSize:9,color:"#f87171"}}>{Math.round(v/100)/10}k</div>}</div>)}</div>
        </div>
        <div style={S.card}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><div style={S.ctitle}>🕐 Recent</div><button style={Btn.out} onClick={()=>setTab("expenses")}>View all</button></div>
          {filt.length===0&&<p style={{color:"#4b5563",fontSize:13,textAlign:"center"}}>No transactions yet.</p>}
          {[...filt].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5).map(t=><TxRow key={t.id} t={t} showEdit={false}/>)}
        </div>
        <div style={S.card}>
          <div style={S.ctitle}>🔒 Backup & Restore</div>
          <div style={{fontSize:12,color:"#6b7280",textAlign:"center",marginBottom:12}}>Download a full backup to keep your data safe.</div>
          <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap",marginBottom:8}}>
            <button style={Btn.grn} onClick={expBk}>💾 Download Backup</button>
            <button style={Btn.pur} onClick={()=>document.getElementById("ri").click()}>📂 Restore Backup</button>
            <input id="ri" type="file" accept=".json" style={{display:"none"}} onChange={impBk}/>
          </div>
        </div>
        <div style={S.card}>
          <div style={S.ctitle}>📥 Export to CSV</div>
          <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}}>
            <select style={S.sel} value={expMo} onChange={e=>setExpMo(+e.target.value)}>{MONTHS.map((m,i)=><option key={i} value={i}>{m}</option>)}</select>
            <select style={S.sel} value={expYr} onChange={e=>setExpYr(+e.target.value)}>{yrs.map(y=><option key={y}>{y}</option>)}</select>
            <button style={Btn.grn} onClick={expCSV}>⬇️ Download CSV</button>
          </div>
        </div>
      </div>}

      {tab==="income"&&<div>
        <div style={S.grid}>
          <MCard label="💰 Total income" value={fmt(inc)} color="#4ade80"/>
          <MCard label="📌 Sources" value={String(incBd.length)} color="#4ade80"/>
        </div>
        <div style={S.card}>
          <div style={S.ctitle}>💰 Income sources</div>
          {incBd.length===0&&<p style={{color:"#4b5563",fontSize:13,textAlign:"center"}}>No income recorded.</p>}
          {incBd.map(x=><BRow key={x[0]} emoji="💰" bg="#052e16" color="#4ade80" label={x[0]} pct={inc>0?(x[1]/inc)*100:0} amt={fmt(x[1])}/>)}
        </div>
        <div style={S.card}>
          <div style={S.ctitle}>💰 Income transactions</div>
          <SelBar list={filt.filter(t=>t.category==="Income")}/>
          {filt.filter(t=>t.category==="Income").length===0&&<p style={{color:"#4b5563",fontSize:13,textAlign:"center"}}>No income this month.</p>}
          {[...filt].filter(t=>t.category==="Income").sort((a,b)=>new Date(b.date)-new Date(a.date)).map(t=><TxRow key={t.id} t={t}/>)}
        </div>
      </div>}

      {tab==="expenses"&&<div>
        <div style={S.grid}>
          <MCard label="💸 Total expenses" value={fmt(exp)} color="#f87171"/>
          <MCard label="📁 Categories" value={String(catTots.length)} color="#f87171"/>
          {inc>0&&<MCard label="📊 % of income" value={(exp/inc*100).toFixed(1)+"%"} color="#facc15"/>}
        </div>
        {catTots.length>0&&<div>
          <div style={S.card}>
            <div style={S.ctitle}>💸 By category</div>
            {catTots.map(x=><BRow key={x[0]} emoji={CATS[x[0]].emoji} bg={CATS[x[0]].bg} color={CATS[x[0]].color} label={x[0]} pct={(x[1]/bMax)*100} amt={fmt(x[1])}/>)}
          </div>
          <div style={S.card}>
            <div style={S.ctitle}>🔍 Subcategory breakdown</div>
            <div style={S.subGrid}>
              {catTots.map(x=>{
                const m=CATS[x[0]];
                const ents=Object.entries(subMap).filter(e=>e[0].startsWith(x[0]+"__")).sort((a,b)=>b[1]-a[1]);
                if(!ents.length)return null;
                return <div key={x[0]} style={{background:m.bg+"55",border:"1px solid "+m.color+"33",borderRadius:12,padding:"12px 14px"}}>
                  <div style={{fontSize:12,fontWeight:600,color:m.color,marginBottom:8,display:"flex",alignItems:"center",gap:5,justifyContent:"center"}}><span>{m.emoji}</span>{x[0]}</div>
                  {ents.map(e=><div key={e[0]} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"3px 0",borderBottom:"1px solid "+m.color+"22"}}><span style={{color:"#6b7280"}}>{e[0].split("__")[1]}</span><span style={{fontWeight:500,color:m.color}}>{fmt(e[1])}</span></div>)}
                </div>;
              })}
            </div>
          </div>
        </div>}
        <div style={S.card}>
          <div style={S.ctitle}>💸 Expense transactions</div>
          <SelBar list={filt.filter(t=>t.category!=="Income")}/>
          {filt.filter(t=>t.category!=="Income").length===0&&<p style={{color:"#4b5563",fontSize:13,textAlign:"center"}}>No expenses this month.</p>}
          {[...filt].filter(t=>t.category!=="Income").sort((a,b)=>new Date(b.date)-new Date(a.date)).map(t=><TxRow key={t.id} t={t}/>)}
        </div>
      </div>}

      {tab==="savings"&&<div>
        <div style={{...S.mrow,justifyContent:"center"}}><select style={S.sel} value={yr} onChange={e=>setYr(+e.target.value)}>{yrs.map(y=><option key={y}>{y}</option>)}</select></div>
        <div style={S.card}>
          <div style={S.ctitle}>🏦 Savings targets — {yr}</div>
          {savTrend.map((row,i)=>{
            const key=mkKey(i,yr),isEd=editSavK===key;
            return <div key={i} style={{padding:"10px 0",borderBottom:"1px solid #1f2937"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>
                <span style={{fontSize:13,fontWeight:500,color:"#e5e7eb",width:36}}>{row.month}</span>
                <div style={{display:"flex",gap:16,flex:1,justifyContent:"center",flexWrap:"wrap"}}>
                  <span style={{fontSize:12,color:"#6b7280"}}>Target: <span style={{color:"#c084fc",fontWeight:600}}>{row.target>0?fmt(row.target):"—"}</span></span>
                  <span style={{fontSize:12,color:"#6b7280"}}>Net: <span style={{color:row.net>=0?"#4ade80":"#f87171",fontWeight:600}}>{row.net<0?"-":""}{fmt(row.net)}</span></span>
                </div>
                <button style={Btn.pur} onClick={()=>{setEditSavK(key);setSavTgt(String(sav[key]||"")); }}>🎯 Set</button>
              </div>
              {isEd&&<div style={{display:"flex",gap:8,marginTop:8,alignItems:"center",justifyContent:"center",flexWrap:"wrap"}}>
                <input style={{...S.fInput,width:140}} type="number" min="0" step="50" placeholder="Target RM" value={savTgt} onChange={e=>setSavTgt(e.target.value)}/>
                <button style={Btn.grn} onClick={()=>saveSavTgt(i,yr)}>✅ Save</button>
                <button style={Btn.out} onClick={()=>setEditSavK(null)}>✕</button>
              </div>}
            </div>;
          })}
        </div>
        <div style={S.card}>
          <div style={S.ctitle}>📈 Net balance trend {yr}</div>
          <Line pts={savTrend.map(r=>Math.max(0,r.net))} color="#c084fc"/>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>{savTrend.map((r,i)=><div key={i} style={{textAlign:"center",flex:1}}><div style={{fontSize:9,color:"#4b5563"}}>{r.month}</div>{r.target>0&&<div style={{fontSize:9,color:"#c084fc"}}>{Math.round(r.target/100)/10}k</div>}</div>)}</div>
        </div>
      </div>}

      {tab==="freecash"&&<div>
        <div style={{...S.mrow,justifyContent:"center"}}><select style={S.sel} value={yr} onChange={e=>setYr(+e.target.value)}>{yrs.map(y=><option key={y}>{y}</option>)}</select></div>
        <div style={S.grid}>
          <MCard label="💵 Total free cash" value={fmt(tfca)} color="#22d3ee"/>
          <MCard label="🛍️ Total used" value={fmt(tfcu)} color="#f87171"/>
          <MCard label="✅ Remaining" value={fmt(tfcr)} color={tfcr>=0?"#4ade80":"#f87171"}/>
        </div>
        <div style={S.card}>
          <div style={S.ctitle}>💵 Free cash by month — {yr}</div>
          {fcMonths.length===0&&<p style={{color:"#4b5563",fontSize:13,textAlign:"center"}}>No data yet.</p>}
          {fcMonths.map(row=><div key={row.month} style={{padding:"10px 0",borderBottom:"1px solid #1f2937"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>
              <span style={{fontSize:13,fontWeight:500,color:"#e5e7eb",width:36}}>{row.month}</span>
              <div style={{display:"flex",gap:14,flex:1,justifyContent:"center",flexWrap:"wrap"}}>
                <span style={{fontSize:12,color:"#6b7280"}}>Free: <span style={{color:"#22d3ee",fontWeight:600}}>{fmt(row.freeCash)}</span></span>
                <span style={{fontSize:12,color:"#6b7280"}}>Used: <span style={{color:"#f87171",fontWeight:600}}>{fmt(row.used)}</span></span>
                <span style={{fontSize:12,color:"#6b7280"}}>Left: <span style={{color:row.remaining>=0?"#4ade80":"#f87171",fontWeight:600}}>{fmt(row.remaining)}</span></span>
              </div>
            </div>
            <div style={{marginTop:6,height:6,borderRadius:3,background:"#374151",overflow:"hidden"}}><div style={{height:"100%",width:(row.freeCash>0?Math.min(100,(row.used/row.freeCash)*100):0)+"%",background:"#f87171",borderRadius:3}}></div></div>
          </div>)}
        </div>
        <div style={S.card}>
          <div style={S.ctitle}>🛍️ Record free cash spending</div>
          <div style={S.fGroup}><label style={S.fLabel}>Date</label><input style={S.fInput} type="date" value={fcF.date} onChange={e=>setFcF(f=>({...f,date:e.target.value}))}/></div>
          <div style={S.fGroup}><label style={S.fLabel}>Amount (RM)</label><input style={S.fInput} type="number" min="0" step="0.01" placeholder="0.00" value={fcF.amount} onChange={e=>setFcF(f=>({...f,amount:e.target.value}))}/></div>
          <div style={S.fGroup}><label style={S.fLabel}>Note</label><input style={S.fInput} type="text" placeholder="What did you spend on?" value={fcF.note} onChange={e=>setFcF(f=>({...f,note:e.target.value}))}/></div>
          <button style={Btn.sav} onClick={addFc}>💵 Record Spending</button>
        </div>
        {fc.length>0&&<div style={S.card}>
          <div style={S.ctitle}>📋 Free cash history</div>
          {[...fc].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(f=><div key={f.id} style={S.txRow}>
            <div style={{width:34,height:34,borderRadius:10,background:"#083344",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>💵</div>
            <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:500,color:"#e5e7eb"}}>{f.note||"Free cash spend"}</div><div style={{fontSize:11,color:"#4b5563"}}>{f.date}</div></div>
            <span style={{fontSize:13,fontWeight:600,color:"#f87171",width:90,textAlign:"right",flexShrink:0}}>-{fmt(f.amount)}</span>
            <button onClick={()=>delFc(f.id)} style={Btn.del}>🗑️</button>
          </div>)}
        </div>}
      </div>}

      {tab==="comparison"&&<div>
        <div style={{...S.mrow,justifyContent:"center",gap:12,flexWrap:"wrap"}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:11,color:"#6b7280"}}>Year</span><select style={S.sel} value={cmpYr} onChange={e=>setCmpYr(+e.target.value)}>{yrs.map(y=><option key={y}>{y}</option>)}</select></div>
          <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{width:10,height:10,borderRadius:2,background:"#60a5fa",display:"inline-block"}}></span><select style={S.sel} value={cmpA} onChange={e=>setCmpA(+e.target.value)}>{MONTHS.map((m,i)=><option key={i} value={i}>{m}</option>)}</select></div>
          <span style={{color:"#4b5563",fontWeight:600}}>vs</span>
          <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{width:10,height:10,borderRadius:2,background:"#c084fc",display:"inline-block"}}></span><select style={S.sel} value={cmpB} onChange={e=>setCmpB(+e.target.value)}>{MONTHS.map((m,i)=><option key={i} value={i}>{m}</option>)}</select></div>
        </div>
        <div style={S.grid}>
          <MCard label={"📅 "+MONTHS[cmpA]+" income"} value={fmt(cmp.iA)} color="#60a5fa"/>
          <MCard label={"📅 "+MONTHS[cmpB]+" income"} value={fmt(cmp.iB)} color="#c084fc"/>
          <MCard label={"💸 "+MONTHS[cmpA]+" exp"} value={fmt(cmp.eA)} color="#60a5fa"/>
          <MCard label={"💸 "+MONTHS[cmpB]+" exp"} value={fmt(cmp.eB)} color="#c084fc"/>
        </div>
        <div style={S.card}>
          <div style={S.ctitle}>📊 Category comparison</div>
          {cmp.cats.length===0&&<p style={{color:"#4b5563",fontSize:13,textAlign:"center"}}>No data for these months.</p>}
          {cmp.cats.map(x=>{const m=CATS[x.cat],mx=Math.max(x.a,x.b,1);return <div key={x.cat} style={{marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6,justifyContent:"center"}}><span>{m.emoji}</span><span style={{fontSize:13,fontWeight:500,color:"#e5e7eb"}}>{x.cat}</span></div>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:11,color:"#60a5fa",width:32,textAlign:"right",flexShrink:0}}>{MONTHS[cmpA]}</span><div style={S.bTrack}><div style={{height:"100%",width:(x.a/mx*100)+"%",background:"#60a5fa",borderRadius:4}}></div></div><span style={{fontSize:12,color:"#9ca3af",width:80,textAlign:"right",flexShrink:0}}>{fmt(x.a)}</span></div>
              <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:11,color:"#c084fc",width:32,textAlign:"right",flexShrink:0}}>{MONTHS[cmpB]}</span><div style={S.bTrack}><div style={{height:"100%",width:(x.b/mx*100)+"%",background:"#c084fc",borderRadius:4}}></div></div><span style={{fontSize:12,color:"#9ca3af",width:80,textAlign:"right",flexShrink:0}}>{fmt(x.b)}</span></div>
              {x.a>0&&x.b>0&&<div style={{fontSize:11,color:x.b>x.a?"#f87171":"#4ade80",textAlign:"center",marginTop:2}}>{x.b>x.a?"📈":"📉"} {Math.abs(((x.b-x.a)/x.a)*100).toFixed(1)}% {x.b>x.a?"more":"less"} than {MONTHS[cmpA]}</div>}
            </div>
          </div>;})}
        </div>
        <div style={S.card}>
          <div style={S.ctitle}>📋 Summary comparison</div>
          {[{l:"Income",a:cmp.iA,b:cmp.iB},{l:"Expenses",a:cmp.eA,b:cmp.eB},{l:"Net",a:cmp.iA-cmp.eA,b:cmp.iB-cmp.eB}].map(row=>{
            const mx=Math.max(Math.abs(row.a),Math.abs(row.b),1);
            return <div key={row.l} style={{marginBottom:14}}>
              <div style={{fontSize:12,fontWeight:500,color:"#9ca3af",marginBottom:6,textAlign:"center"}}>{row.l}</div>
              <div style={{display:"flex",flexDirection:"column",gap:4}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:11,color:"#60a5fa",width:32,textAlign:"right",flexShrink:0}}>{MONTHS[cmpA]}</span><div style={S.bTrack}><div style={{height:"100%",width:(Math.abs(row.a)/mx*100)+"%",background:"#60a5fa",borderRadius:4}}></div></div><span style={{fontSize:12,color:"#9ca3af",width:80,textAlign:"right",flexShrink:0}}>{row.a<0?"-":""}{fmt(row.a)}</span></div>
                <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:11,color:"#c084fc",width:32,textAlign:"right",flexShrink:0}}>{MONTHS[cmpB]}</span><div style={S.bTrack}><div style={{height:"100%",width:(Math.abs(row.b)/mx*100)+"%",background:"#c084fc",borderRadius:4}}></div></div><span style={{fontSize:12,color:"#9ca3af",width:80,textAlign:"right",flexShrink:0}}>{row.b<0?"-":""}{fmt(row.b)}</span></div>
              </div>
            </div>;
          })}
        </div>
      </div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
